# render.yaml — Render.com Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Spring Boot API ───────────────────────────────────────────
  - type: web
    name: mavuti-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend          # <── build context = backend/ folder
    plan: free
    region: oregon

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: mavuti-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mavuti-health.onrender.com"

    healthCheckPath: /actuator/health
    autoDeploy: true

  # ── React Frontend (Nginx) ────────────────────────────────────
  - type: web
    name: mavuti-health
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend         # <── build context = frontend/ folder
    plan: free
    region: oregon

    envVars:
      - key: VITE_API_BASE_URL
        value: "https://mavuti-api.onrender.com/api/v1"

    autoDeploy: true

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: mavuti-db
    plan: free
    databaseName: mavutidb
    user: mavuti