# render.yaml — Render.com Infrastructure as Code
# Defines both the Spring Boot API and React frontend as Render services.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Spring Boot API ───────────────────────────────────────────
  - type: web
    name: mavuti-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free             # upgrade to starter for always-on
    region: oregon         # closest to South Africa available: oregon

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: mavuti-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: GEMINI_API_KEY
        sync: false           # Must be set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mavuti-health.onrender.com"

    healthCheckPath: /actuator/health

    autoDeploy: false        # Controlled by GitHub Actions trigger

  # ── React Frontend (served by Nginx) ─────────────────────────
  - type: web
    name: mavuti-health
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    region: oregon

    envVars:
      - key: VITE_API_BASE_URL
        value: "https://mavuti-api.onrender.com/api/v1"

    autoDeploy: false

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: mavuti-db
    plan: free
    databaseName: mavutidb
    user: mavuti
