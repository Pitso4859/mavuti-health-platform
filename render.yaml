services:
  - type: web
    name: mavuti-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: mavuti-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mavuti-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mavuti-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: mavuti-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: mavuti-db
          property: password
      # FIX: removed generateValue:true — that was regenerating the secret
      # on every deploy and invalidating all user tokens.
      # JWT_SECRET must be set MANUALLY in the Render dashboard once and
      # never change. sync:false tells Render "don't touch this value".
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mavuti-health.onrender.com"

    healthCheckPath: /actuator/health
    autoDeploy: true

  - type: web
    name: mavuti-health
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon

    envVars:
      - key: VITE_API_BASE_URL
        value: "https://mavuti-api.onrender.com"

    autoDeploy: true

databases:
  - name: mavuti-db
    plan: free
    databaseName: mavutidb
    user: mavuti