spring:
  application:
    name: mavuti-health-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 200

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Spring AI — Gemini via OpenAI-compatible endpoint
  ai:
    openai:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-1.5-flash
          temperature: 0.3
          max-tokens: 1024

server:
  port: ${PORT:${SERVER_PORT:8080}}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-in-production-32bytes!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}

  cors:
    # FIX: In production this MUST be set to the exact frontend URL.
    # Add CORS_ALLOWED_ORIGINS as a Render env var on the mavuti-api service:
    #   Key:   CORS_ALLOWED_ORIGINS
    #   Value: https://mavuti-health.onrender.com
    # Multiple origins (e.g. staging + prod) can be comma-separated:
    #   https://mavuti-health.onrender.com,https://mavuti-staging.onrender.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  rate-limit:
    ai-requests-per-minute: 10
    auth-requests-per-minute: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  info:
    title: Mavuti Health Platform API
    version: 2.0.0
    description: VUT Health Clinic API with Spring AI + Gemini assistant