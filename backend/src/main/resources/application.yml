spring:
  application:
    name: mavuti-health-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 200

  # Jackson: serialize Java 8 date/time correctly
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:${SERVER_PORT:8080}}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-in-production-32bytes!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}    # 24 h
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  # Gemini AI configuration
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    model: gemini-1.5-flash
    max-tokens: 1024
    temperature: 0.3

  # Rate limiting: AI endpoint is expensive - limit per user/IP
  rate-limit:
    ai-requests-per-minute: 10
    auth-requests-per-minute: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  info:
    title: Mavuti Health Platform API
    version: 2.0.0
    description: VUT Health Clinic API with AI-powered health assistant
